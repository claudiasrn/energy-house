<!DOCTYPE html>
<html lang="en">
  <head>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Dogs — Energy House</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .dog-profile-hero { display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; padding-top: 136px; }
      .dog-profile-photo { background: #d9cfc0; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; color: #8b5a2b; letter-spacing: 0.2em; min-height: 600px; position: sticky; top: 136px; height: calc(100vh - 136px); overflow: hidden; }
      .dog-profile-photo img { width: 100%; height: 100%; object-fit: cover; }
      .dog-profile-info { padding: 80px 70px; display: flex; flex-direction: column; }
      .back-link { font-family: 'Jost', sans-serif; font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: #8b5a2b; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 60px; transition: gap 0.3s; }
      .back-link:hover { gap: 14px; }
      .back-link::before { content: '←'; font-size: 0.8rem; }
      .dog-profile-sex { font-family: 'Jost', sans-serif; font-size: 0.65rem; letter-spacing: 0.4em; text-transform: uppercase; color: #8b5a2b; margin-bottom: 16px; }
      .dog-profile-name { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 4vw, 3.5rem); font-weight: 300; color: #2c1a0e; line-height: 1.1; margin-bottom: 32px; }
      .dog-profile-name em { font-style: italic; color: #8b5a2b; }
      .dog-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px 40px; margin-bottom: 60px; padding-bottom: 60px; border-bottom: 1px solid rgba(139,90,43,0.15); }
      .dog-meta-item { display: flex; flex-direction: column; gap: 6px; }
      .dog-meta-label { font-family: 'Jost', sans-serif; font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase; color: #8b5a2b; }
      .dog-meta-value { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 300; color: #2c1a0e; }
      .pedigree-section { margin-bottom: 60px; }
      .pedigree-heading { font-family: 'Jost', sans-serif; font-size: 0.65rem; letter-spacing: 0.4em; text-transform: uppercase; color: #8b5a2b; margin-bottom: 32px; }
      .pedigree-tree { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(8, auto); font-family: 'Jost', sans-serif; font-size: 0.72rem; }
      .ped-box { border: 1px solid rgba(139,90,43,0.2); padding: 10px 14px; background: #f5f0e8; display: flex; flex-direction: column; justify-content: center; min-height: 52px; transition: background 0.2s, border-color 0.2s; }
      .ped-box:hover { background: #eee8dc; border-color: rgba(139,90,43,0.4); }
      .ped-box.sire    { border-left: 3px solid #8b5a2b; }
      .ped-box.dam     { border-left: 3px solid #c4a882; }
      .ped-box.unknown { border-left: 3px solid #ccc; opacity: 0.5; }
      .ped-box-name { color: #2c1a0e; font-weight: 300; line-height: 1.35; }
      .ped-box-role { font-size: 0.55rem; letter-spacing: 0.25em; text-transform: uppercase; color: #8b5a2b; margin-top: 3px; }
      .ped-g1-sire { grid-column: 1; grid-row: 1 / 5; } .ped-g1-dam  { grid-column: 1; grid-row: 5 / 9; }
      .ped-g2-ss   { grid-column: 2; grid-row: 1 / 3; } .ped-g2-sd   { grid-column: 2; grid-row: 3 / 5; }
      .ped-g2-ds   { grid-column: 2; grid-row: 5 / 7; } .ped-g2-dd   { grid-column: 2; grid-row: 7 / 9; }
      .ped-g3-sss  { grid-column: 3; grid-row: 1; }     .ped-g3-ssd  { grid-column: 3; grid-row: 2; }
      .ped-g3-sds  { grid-column: 3; grid-row: 3; }     .ped-g3-sdd  { grid-column: 3; grid-row: 4; }
      .ped-g3-dss  { grid-column: 3; grid-row: 5; }     .ped-g3-dsd  { grid-column: 3; grid-row: 6; }
      .ped-g3-dds  { grid-column: 3; grid-row: 7; }     .ped-g3-ddd  { grid-column: 3; grid-row: 8; }
      .dog-not-found { grid-column: 1/-1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 120px 40px; text-align: center; }
      .dog-not-found h2 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 300; color: #2c1a0e; margin-bottom: 16px; }
      @media (max-width: 900px) {
        .dog-profile-hero { grid-template-columns: 1fr; padding-top: 80px; }
        .dog-profile-photo { position: static; height: 60vw; min-height: 300px; }
        .dog-profile-info { padding: 50px 30px; }
        .ped-g3-sss,.ped-g3-ssd,.ped-g3-sds,.ped-g3-sdd,.ped-g3-dss,.ped-g3-dsd,.ped-g3-dds,.ped-g3-ddd { display: none; }
        .pedigree-tree { grid-template-columns: 1fr 1fr; }
        .ped-g1-sire { grid-column: 1; grid-row: 1/3; } .ped-g1-dam { grid-column: 1; grid-row: 3/5; }
        .ped-g2-ss   { grid-column: 2; grid-row: 1; }   .ped-g2-sd  { grid-column: 2; grid-row: 2; }
        .ped-g2-ds   { grid-column: 2; grid-row: 3; }   .ped-g2-dd  { grid-column: 2; grid-row: 4; }
      }
    </style>
  </head>
  <body>
    <nav>
      <img src="images/logo-icon.png" class="nav-logo" alt="Energy House" />
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="dogs.html">Our Dogs</a></li>
        <li><a href="champions.html">Champions</a></li>
        <li><a href="litters.html">Litters</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>

    <div id="page-content">
      <div class="dog-profile-hero">
        <div class="dog-not-found" style="grid-column:1/-1">
          <p style="font-family:'Jost',sans-serif;font-size:0.7rem;letter-spacing:0.2em;color:#8b5a2b;text-transform:uppercase;">Loading...</p>
        </div>
      </div>
    </div>

    <footer>
      <div class="footer-logo">
        <img src="images/logo-icon.png" alt="Energy House" class="footer-icon" />
        <img src="images/logo-text.png" alt="Energy House" class="footer-title-img" />
      </div>
      <div class="footer-links">
        <a href="index.html">Home</a><a href="about.html">About</a><a href="dogs.html">Our Dogs</a>
        <a href="champions.html">Champions</a><a href="litters.html">Litters</a><a href="contact.html">Contact</a>
      </div>
      <div class="footer-social">
        <a href="https://instagram.com/energyhouse26" target="_blank">Instagram</a>
        <p>© 2025 Energy House. All rights reserved.</p>
      </div>
    </footer>

    <script type="module">
      // Use Firestore REST API directly — avoids SDK streaming connection issues
      const PROJECT = "energy-house-60783";
      const BASE    = `https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/documents`;

      // ── Helpers ──────────────────────────────────────────────────
      function formatName(fullName) {
        const suffix = " of Energy House";
        if (fullName?.endsWith(suffix)) {
          return { main: fullName.slice(0, -suffix.length), suffix: "of Energy House" };
        }
        return { main: fullName || '—', suffix: '' };
      }

      function metaItem(label, value) {
        return `<div class="dog-meta-item">
          <span class="dog-meta-label">${label}</span>
          <span class="dog-meta-value">${value || '—'}</span>
        </div>`;
      }

      function pedBox(dog, cssClass, role) {
        const name = dog?.name || '—';
        const side = dog ? (dog.sex === 'M' ? 'sire' : 'dam') : 'unknown';
        return `<div class="ped-box ${cssClass} ${side}">
          <span class="ped-box-name">${name}</span>
          <span class="ped-box-role">${role}</span>
        </div>`;
      }

      function buildTree(dog, dogs) {
        const sire  = dog.sire  ? dogs[String(dog.sire)]  : null;
        const dam   = dog.dam   ? dogs[String(dog.dam)]   : null;
        const g2ss  = sire?.sire ? dogs[String(sire.sire)] : null;
        const g2sd  = sire?.dam  ? dogs[String(sire.dam)]  : null;
        const g2ds  = dam?.sire  ? dogs[String(dam.sire)]  : null;
        const g2dd  = dam?.dam   ? dogs[String(dam.dam)]   : null;

        return `<div class="pedigree-tree">
          ${pedBox(sire,                  'ped-g1-sire', 'Sire')}
          ${pedBox(dam,                   'ped-g1-dam',  'Dam')}
          ${pedBox(g2ss,                  'ped-g2-ss',   'Paternal Grandsire')}
          ${pedBox(g2sd,                  'ped-g2-sd',   'Paternal Granddam')}
          ${pedBox(g2ds,                  'ped-g2-ds',   'Maternal Grandsire')}
          ${pedBox(g2dd,                  'ped-g2-dd',   'Maternal Granddam')}
          ${pedBox(g2ss?.sire ? dogs[String(g2ss.sire)] : null, 'ped-g3-sss', 'GG-Grandsire')}
          ${pedBox(g2ss?.dam  ? dogs[String(g2ss.dam)]  : null, 'ped-g3-ssd', 'GG-Granddam')}
          ${pedBox(g2sd?.sire ? dogs[String(g2sd.sire)] : null, 'ped-g3-sds', 'GG-Grandsire')}
          ${pedBox(g2sd?.dam  ? dogs[String(g2sd.dam)]  : null, 'ped-g3-sdd', 'GG-Granddam')}
          ${pedBox(g2ds?.sire ? dogs[String(g2ds.sire)] : null, 'ped-g3-dss', 'GG-Grandsire')}
          ${pedBox(g2ds?.dam  ? dogs[String(g2ds.dam)]  : null, 'ped-g3-dsd', 'GG-Granddam')}
          ${pedBox(g2dd?.sire ? dogs[String(g2dd.sire)] : null, 'ped-g3-dds', 'GG-Grandsire')}
          ${pedBox(g2dd?.dam  ? dogs[String(g2dd.dam)]  : null, 'ped-g3-ddd', 'GG-Granddam')}
        </div>`;
      }

      // ── REST helpers ─────────────────────────────────────────────
      function parseDoc(firestoreDoc) {
        // Convert Firestore REST format to plain object
        const fields = firestoreDoc.fields || {};
        const out = {};
        for (const [k, v] of Object.entries(fields)) {
          if      (v.stringValue  !== undefined) out[k] = v.stringValue;
          else if (v.integerValue !== undefined) out[k] = Number(v.integerValue);
          else if (v.doubleValue  !== undefined) out[k] = v.doubleValue;
          else if (v.booleanValue !== undefined) out[k] = v.booleanValue;
          else if (v.nullValue    !== undefined) out[k] = null;
          else out[k] = null;
        }
        return out;
      }

      async function fetchDog(id) {
        try {
          const res = await fetch(`${BASE}/dogs/${id}`);
          if (!res.ok) return null;
          const data = await res.json();
          return parseDoc(data);
        } catch(e) { return null; }
      }

      // ── Main ─────────────────────────────────────────────────────
      async function render() {
        const params  = new URLSearchParams(window.location.search);
        const id      = params.get('id');
        const content = document.getElementById('page-content');

        if (!id) { content.innerHTML = notFound(); return; }

        const dog = await fetchDog(id);
        if (!dog) { content.innerHTML = notFound(); return; }

        const { main, suffix } = formatName(dog.name);
        document.title = `${main} — Energy House`;

        // Fetch ancestors generation by generation
        const dogs = { [String(id)]: dog };

        // Gen 1
        const g1ids = [dog.sire, dog.dam].filter(Boolean).map(String);
        const g1 = await Promise.all(g1ids.map(fetchDog));
        g1ids.forEach((aid, i) => { if (g1[i]) dogs[aid] = g1[i]; });

        // Gen 2
        const g2ids = [...new Set(g1.flatMap(d => d ? [d.sire, d.dam].filter(Boolean).map(String) : []))];
        const g2 = await Promise.all(g2ids.map(fetchDog));
        g2ids.forEach((aid, i) => { if (g2[i]) dogs[aid] = g2[i]; });

        // Gen 3
        const g3ids = [...new Set(g2.flatMap(d => d ? [d.sire, d.dam].filter(Boolean).map(String) : []))];
        const g3 = await Promise.all(g3ids.map(fetchDog));
        g3ids.forEach((aid, i) => { if (g3[i]) dogs[aid] = g3[i]; });

        const photoHtml = dog.photo
          ? `<img src="${dog.photo}" alt="${dog.name}" />`
          : '[ Photo ]';

        content.innerHTML = `
          <div class="dog-profile-hero">
            <div class="dog-profile-photo">${photoHtml}</div>
            <div class="dog-profile-info fade-in">
              <a href="dogs.html" class="back-link">Our Dogs</a>
              <p class="dog-profile-sex">${dog.sex === 'M' ? 'Male' : 'Female'}</p>
              <h1 class="dog-profile-name">
                ${main}${suffix ? `<br /><em>${suffix}</em>` : ''}
              </h1>
              <div class="dog-meta-grid">
                ${metaItem('Date of Birth', dog.dob)}
                ${metaItem('Color',         dog.color)}
                ${metaItem('Titles',        dog.titles)}
                ${metaItem('Registration',  dog.reg)}
              </div>
              <div class="pedigree-section">
                <p class="pedigree-heading">3-Generation Pedigree</p>
                ${buildTree(dog, dogs)}
              </div>
              <a href="contact.html" class="btn" style="animation:none;opacity:1;">
                Enquire About This Dog
              </a>
            </div>
          </div>`;
      }

      function notFound() {
        return `<div class="dog-profile-hero">
          <div class="dog-not-found">
            <h2>Dog not found</h2>
            <p><a href="dogs.html" style="color:#8b5a2b;font-family:'Jost',sans-serif;font-size:0.75rem;">← Back to Our Dogs</a></p>
          </div>
        </div>`;
      }

      render();
    </script>
    <script src="js/main.js"></script>
  </body>
</html>
