<!DOCTYPE html>
<html lang="en">
  <head>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="French Bulldog profile — Energy House kennel, Sremska Mitrovica, Serbia." />
   <meta property="og:title" content="Our Dogs — Energy House" />
<meta property="og:description" content="Meet the Energy House French Bulldogs — browse our males and females, all health tested and bred to the highest standard." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://energyhouse.rs/dogs.html" /> 
    <title>Our Dogs — Energy House</title>
    <link rel="icon" href="images/logo-icon.png" type="image/png" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      a.dog-card-link {
        text-decoration: none;
        color: inherit;
        display: contents;
      }
      .dog-card-full .dog-info-full::after {
        content: '→';
        display: block;
        font-size: 0.75rem;
        color: var(--accent);
        letter-spacing: 0.2em;
        margin-top: 12px;
        opacity: 0;
        transform: translateX(-6px);
        transition: opacity 0.3s, transform 0.3s;
      }
      .dog-card-full:hover .dog-info-full::after {
        opacity: 1;
        transform: translateX(0);
      }
      .dogs-loading {
        grid-column: 1 / -1;
        text-align: center;
        font-family: 'Jost', sans-serif;
        font-size: 0.7rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--accent);
        padding: 80px 0;
      }
      .dog-info-full h3 em {
        font-style: italic;
        color: var(--accent);
        font-size: inherit;
      }
    </style>
  </head>
  <body>

    <nav>
      <img src="images/logo-icon.png" class="nav-logo" alt="Energy House" />
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="dogs.html">Our Dogs</a></li>
        <li><a href="champions.html">Champions</a></li>
        <li><a href="litters.html">Litters</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button class="nav-toggle" aria-label="Toggle navigation">
          <span></span>
          <span></span>
          <span></span>
      </button>
    </nav>

    <section class="page-hero fade-in">
      <p class="hero-tag">Our Dogs</p>
      <h1>Meet the <em>Energy House</em> Family</h1>
    </section>

    <div class="filter-bar fade-in">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="male">Males</button>
      <button class="filter-btn" data-filter="female">Females</button>
    </div>

    <!-- Empty container — cards are injected by the script below -->
    <section class="dogs-page-grid" id="dogs-grid">
      <p class="dogs-loading">Loading...</p>
    </section>

    <footer>
      <div class="footer-logo">
        <img src="images/logo-icon.png" alt="Energy House" class="footer-icon" />
        <img src="images/logo-text.png" alt="Energy House" class="footer-title-img" />
      </div>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="dogs.html">Our Dogs</a>
        <a href="champions.html">Champions</a>
        <a href="litters.html">Litters</a>
        <a href="contact.html">Contact</a>
      </div>
      <div class="footer-social">
        <a href="https://instagram.com/energyhouse26" target="_blank">Instagram</a>
        <p>© 2025 Energy House. All rights reserved.</p>
      </div>
    </footer>

    <script type="module">
      const PROJECT = "energy-house-60783";
      const BASE    = `https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/documents`;

      // ------------------------------------------------------------------
      // parseDoc
      // Firestore REST API returns fields in a typed format like:
      //   { name: { stringValue: "Rex" }, sire: { integerValue: "12" } }
      // This function unwraps that into a plain JS object:
      //   { name: "Rex", sire: 12 }
      // ------------------------------------------------------------------
      function parseDoc(doc) {
        const fields = doc.fields || {};
        const out = {};
        for (const [k, v] of Object.entries(fields)) {
          if      (v.stringValue  !== undefined) out[k] = v.stringValue;
          else if (v.integerValue !== undefined) out[k] = Number(v.integerValue);
          else if (v.booleanValue !== undefined) out[k] = v.booleanValue;
          else out[k] = null;
        }
        return out;
      }

      // ------------------------------------------------------------------
      // formatName
      // Splits "Paint it Black of Energy House" into two parts so we can
      // style the suffix separately on the card:
      //   { main: "Paint it Black", suffix: "of Energy House" }
      // Dogs without the suffix are returned as-is.
      // ------------------------------------------------------------------
      function formatName(fullName) {
        const suffixes = [" of Energy House", " for Energy House", " at Energy House"];
        for (const suffix of suffixes) {
          if (fullName?.endsWith(suffix)) {
              return { main: fullName.slice(0, -suffix.length), suffix: suffix.trim() };
          }
        }
        return { main: fullName || "—", suffix: "" };
      }

      // ------------------------------------------------------------------
      // buildCard
      // Returns the HTML string for one dog card.
      // id  — the Firestore document ID, e.g. "191"
      // dog — plain object with fields: name, sex, dob, color, photo, etc.
      // ------------------------------------------------------------------
      function buildCard(id, dog) {
        const { main, suffix } = formatName(dog.name);

        // data-sex drives the filter buttons — must be "male" or "female"
        const sex      = dog.sex === "M" ? "male" : "female";
        const sexLabel = dog.sex === "M" ? "Male" : "Female";

        // Combine DOB and color into one line; skip whichever is missing
        const detail = [dog.dob, dog.color].filter(Boolean).join(" · ") || "—";

        // Show the photo if one exists, otherwise leave the placeholder empty
        const photoHtml = dog.photo
          ? `<img src="${dog.photo}" alt="${dog.name}" style="width:100%;height:100%;object-fit:cover;" />`
          : "";

        return `
          <a class="dog-card-link" href="dog.html?id=${id}">
            <div class="dog-card-full fade-in" data-sex="${sex}">
              <div class="dog-photo-full">${photoHtml}</div>
              <div class="dog-info-full">
                <p class="dog-titles">${sexLabel}</p>
                <h3>${main}${suffix ? `<br/><em>${suffix}</em>` : ""}</h3>
                <p class="dog-detail">${detail}</p>
              </div>
            </div>
          </a>`;
      }

      // ------------------------------------------------------------------
      // loadDogs
      // Fetches the entire "dogs" collection from Firestore, filters to
      // only Energy House dogs (those whose names end with "of Energy House"),
      // sorts them (males first, then alphabetically), builds the cards,
      // and wires up the filter buttons.
      // ------------------------------------------------------------------
      async function loadDogs() {
        const grid = document.getElementById("dogs-grid");

        try {
          // Fetching /dogs returns all documents in the collection.
          // The response shape is: { documents: [ ...array ] }
          let documents = [];
          let pageToken = '';
          do {
              const url = `${BASE}/dogs?pageSize=300${pageToken ? '&pageToken=' + pageToken : ''}`;
              const res  = await fetch(url);
              const data = await res.json();
              if (data.documents) documents.push(...data.documents);
              pageToken = data.nextPageToken || '';
          } while (pageToken);

          if (!documents.length) {
              grid.innerHTML = `<p class="dogs-loading">No dogs found.</p>`;
              return;
          }

          const allDogs = documents.map(doc => ({
            id: doc.name.split("/").at(-1),
            ...parseDoc(doc),
          }));

          // Filter: only show dogs that belong to Energy House.
          // This excludes the 180+ ancestor dogs stored for pedigree purposes.
          const ownDogs = allDogs.filter(d => d.show === true);

          if (!ownDogs.length) {
            grid.innerHTML = `<p class="dogs-loading">No dogs found.</p>`;
            return;
          }

          // Sort: males first, then females; alphabetically within each group
          ownDogs.sort((a, b) => {
            if (a.sex !== b.sex) return a.sex === "M" ? -1 : 1;
            return (a.name || "").localeCompare(b.name || "");
          });

          // Inject all cards into the grid
          grid.innerHTML = ownDogs.map(d => buildCard(d.id, d)).join("");

          // The IntersectionObserver in main.js only runs on page load, so
          // it never sees these dynamically created elements. We set up a
          // fresh observer here for the new cards.
          const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) entry.target.classList.add("visible");
            });
          }, { threshold: 0.1 });

          grid.querySelectorAll(".fade-in").forEach(el => observer.observe(el));

          // Wire up the filter buttons now — after the cards exist in the DOM.
          // This fixes the race condition where main.js ran the filter code
          // before these cards were created, finding nothing to filter.
          const filterBtns = document.querySelectorAll(".filter-btn");
          const dogCards   = grid.querySelectorAll(".dog-card-full");

          filterBtns.forEach(btn => {
            btn.addEventListener("click", () => {
              filterBtns.forEach(b => b.classList.remove("active"));
              btn.classList.add("active");

              const filter = btn.dataset.filter;
              dogCards.forEach(card => {
                const show = filter === "all" || card.dataset.sex === filter;
                // Hide/show the <a> wrapper, not just the inner div,
                // so the grid layout collapses the space correctly.
                card.closest(".dog-card-link").style.display = show ? "" : "none";
              });
            });
          });

        } catch (err) {
          grid.innerHTML = `<p class="dogs-loading">Could not load dogs. Please try again later.</p>`;
          console.error(err);
        }
      }

      loadDogs();
    </script>

    <script src="js/main.js"></script>
  </body>
</html>
