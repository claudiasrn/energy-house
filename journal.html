<!DOCTYPE html>
<html lang="en">
  <head>

    <meta name="description" content="Journal — Energy House French Bulldog kennel. Articles about French Bulldogs, breeding, and kennel life." />
    <meta property="og:title" content="Journal — Energy House" />
    <meta property="og:description" content="Articles about French Bulldogs, breeding, and kennel life from Energy House." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://energyhouse.rs/journal.html" />
    <link rel="canonical" href="https://energyhouse.rs/journal.html" />
    <title>Journal — Energy House</title>
    <link rel="icon" href="images/logo-icon.png" type="image/png" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <nav>
      <img src="images/logo-icon.png" class="nav-logo" alt="Energy House" width="80" height="80"/>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="dogs.html">Our Dogs</a></li>
        <li><a href="journal.html">Journal</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </nav>

    <section class="page-hero">
      <p class="hero-tag">From the Kennel</p>
      <h1>The Energy House <em>Journal</em></h1>
    </section>

    <section class="journal-grid" id="journal-grid">
      <p class="dogs-loading">Loading...</p>
    </section>

    <footer>
      <div class="footer-logo">
        <img src="images/logo-icon.png" alt="Energy House" class="footer-icon" width="50" height="50"/>
        <img src="images/logo-text.png" alt="Energy House" class="footer-title-img" width="200" height="35"/>
      </div>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="dogs.html">Our Dogs</a>
        <a href="journal.html">Journal</a>
        <a href="contact.html">Contact</a>
      </div>
      <div class="footer-social">
        <a href="https://instagram.com/energyhouse26" target="_blank">Instagram</a>
        <a href="https://www.facebook.com/share/1GFuo3yJwV/" target="_blank">Facebook</a>
        <p>© 2025 Energy House. All rights reserved.</p>
      </div>
    </footer>

    <script type="module">
      const PROJECT = "energy-house-60783";
      const BASE = `https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/documents`;

      function parseDoc(doc) {
        const fields = doc.fields || {};
        const out = {};
        for (const [k, v] of Object.entries(fields)) {
          if      (v.stringValue  !== undefined) out[k] = v.stringValue;
          else if (v.integerValue !== undefined) out[k] = Number(v.integerValue);
          else if (v.booleanValue !== undefined) out[k] = v.booleanValue;
          else out[k] = null;
        }
        return out;
      }

      async function loadJournal() {
        const grid = document.getElementById('journal-grid');
        try {
          let documents = [];
          let pageToken = '';
          do {
            const url = `${BASE}/articles?pageSize=300${pageToken ? '&pageToken=' + pageToken : ''}`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.documents) documents.push(...data.documents);
            pageToken = data.nextPageToken || '';
          } while (pageToken);

          const articles = documents
            .map(doc => ({ id: doc.name.split('/').at(-1), ...parseDoc(doc) }))
            .filter(a => a.published === true)
            .sort((a, b) => b.date?.localeCompare(a.date));

          if (!articles.length) {
            grid.innerHTML = '<p class="dogs-loading">No entries yet.</p>';
            return;
          }

          grid.innerHTML = articles.map(a => `
            <a class="journal-card-link" href="entry.html?id=${a.id}">
              <article class="journal-card fade-in">
                ${a.photo ? `<div class="journal-card-photo"><img src="${a.photo}" alt="${a.title}" /></div>` : ''}
                <div class="journal-card-info">
                  <p class="journal-card-date">${a.date || ''}</p>
                  <h2 class="journal-card-title">${a.title || 'Untitled'}</h2>
                  <p class="journal-card-intro">${a.intro || ''}</p>
                  <span class="journal-read-more">Read more →</span>
                </div>
              </article>
            </a>`).join('');

          const observer = new IntersectionObserver(entries => {
            entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
          }, { threshold: 0.1 });
          grid.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

        } catch(err) {
          grid.innerHTML = '<p class="dogs-loading">Could not load journal. Please try again later.</p>';
          console.error(err);
        }
      }

      loadJournal();
    </script>
    <script src="js/main.js"></script>
  </body>
</html>
